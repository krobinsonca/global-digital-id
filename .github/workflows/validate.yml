name: Validate Data

on:
  pull_request:
    branches: [main]
    paths:
      - 'data.json'
  push:
    branches: [main]
    paths:
      - 'data.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run data validation
        run: python3 validate_data.py data.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
          retention-days: 30
