<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Trader - Paper Trading</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; 
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* Header */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 24px; 
      padding-bottom: 16px; 
      border-bottom: 1px solid #21262d; 
    }
    .header h1 { font-size: 24px; color: #58a6ff; }
    .header p { color: #8b949e; font-size: 12px; }
    .portfolio-value { text-align: right; }
    .portfolio-value .amount { font-size: 28px; font-weight: 700; color: #3fb950; }
    .portfolio-value .label { color: #8b949e; font-size: 12px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { 
      padding: 10px 20px; 
      background: #21262d; 
      color: #58a6ff; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600;
      font-family: inherit;
    }
    .tab.inactive { background: transparent; color: #8b949e; }
    
    /* Grid */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    
    /* Cards */
    .card { background: #161b22; border-radius: 12px; padding: 16px; }
    .card h3 { color: #e6edf3; margin-bottom: 16px; }
    
    /* Market Item */
    .market-item { 
      display: flex; 
      justify-content: space-between; 
      padding: 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      margin-bottom: 4px;
    }
    .market-item:hover { background: #21262d; }
    .market-item.selected { background: #21262d; }
    .market-item .symbol { color: #e6edf3; font-weight: 600; }
    .market-item .name { color: #8b949e; font-size: 12px; }
    .market-item .price { color: #e6edf3; text-align: right; }
    .market-item .change { text-align: right; font-size: 12px; }
    .up { color: #3fb950; }
    .down { color: #f85149; }
    
    /* Trade Panel */
    .price-display { margin-bottom: 20px; padding: 12px; background: #0d1117; border-radius: 8px; }
    .price-display .label { color: #8b949e; font-size: 12px; }
    .price-display .price { color: #58a6ff; font-size: 24px; font-weight: 700; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 8px; }
    .form-group input { 
      width: 100%; 
      padding: 12px; 
      background: #0d1117; 
      border: 1px solid #30363d; 
      border-radius: 8px; 
      color: #e6edf3; 
      font-size: 18px; 
      font-family: inherit;
    }
    
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .btn { padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-buy { background: #238636; color: white; }
    .btn-sell { background: #da3633; color: white; }
    
    .balance-info { padding: 12px; background: #0d1117; border-radius: 8px; }
    .balance-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .balance-row:last-child { margin-bottom: 0; }
    .balance-row .label { color: #8b949e; }
    .balance-row .value { color: #e6edf3; }
    
    /* Status Bar */
    .status-bar { 
      margin-top: 24px; 
      padding: 12px; 
      background: #161b22; 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-between; 
      font-size: 12px; 
      color: #8b949e; 
    }
    
    /* History */
    .history-item { 
      display: flex; 
      justify-content: space-between; 
      padding: 12px; 
      border-bottom: 1px solid #21262d; 
    }
    .history-type { font-weight: 600; margin-right: 12px; }
    .history-type.buy { color: #3fb950; }
    .history-type.sell { color: #f85149; }
    .history-info { color: #e6edf3; }
    .history-meta { color: #8b949e; font-size: 12px; }
    
    .empty { color: #8b949e; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>📈 Crypto Trader</h1>
        <p>Paper Trading Simulator</p>
      </div>
      <div class="portfolio-value">
        <div class="amount" id="totalValue">$10,000.00</div>
        <div class="label">Portfolio Value</div>
      </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" onclick="showTab('trade')">Trade</button>
      <button class="tab inactive" onclick="showTab('history')">History</button>
    </div>
    
    <!-- Trade View -->
    <div id="tradeView" class="grid">
      <!-- Markets -->
      <div class="card">
        <h3>Markets</h3>
        <div id="markets"></div>
      </div>
      
      <!-- Trade Panel -->
      <div class="card">
        <h3>Trade <span id="selectedCoin">BTC</span></h3>
        
        <div class="price-display">
          <div class="label">Current Price</div>
          <div class="price" id="currentPrice">$66,800.00</div>
        </div>
        
        <div class="form-group">
          <label>Amount (<span id="coinSymbol">BTC</span>)</label>
          <input type="number" id="tradeAmount" placeholder="0.00" step="0.0001">
        </div>
        
        <div class="buttons">
          <button class="btn btn-buy" onclick="handleBuy()">BUY</button>
          <button class="btn btn-sell" onclick="handleSell()">SELL</button>
        </div>
        
        <div class="balance-info">
          <div class="balance-row">
            <span class="label">USD Balance</span>
            <span class="value" id="usdBalance">$10,000.00</span>
          </div>
          <div class="balance-row">
            <span class="label"><span id="coinSymbol2">BTC</span> Balance</span>
            <span class="value" id="coinBalance">0.000000</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- History View -->
    <div id="historyView" class="card" style="display: none;">
      <h3>Trade History</h3>
      <div id="historyList">
        <div class="empty">No trades yet</div>
      </div>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
      <span>🔄 Paper Trading Mode</span>
      <span>Prices update every 3s</span>
      <span>💰 Starting balance: $10,000</span>
    </div>
  </div>
  
  <script>
    // State
    const portfolio = { usd: 10000, btc: 0, eth: 0, bnb: 0 };
    const holdings = {};
    const prices = [
      { symbol: 'BTC', name: 'Bitcoin', price: 66800, change24h: 2.34 },
      { symbol: 'ETH', name: 'Ethereum', price: 3450, change24h: 1.87 },
      { symbol: 'BNB', name: 'BNB', price: 580, change24h: -0.45 },
      { symbol: 'SOL', name: 'Solana', price: 145, change24h: 5.67 },
      { symbol: 'XRP', name: 'XRP', price: 0.62, change24h: -1.23 }
    ];
    let selectedCoin = 'BTC';
    let history = [];
    
    // Get price
    function getPrice(symbol) {
      const coin = prices.find(p => p.symbol === symbol);
      return coin ? coin.price : 0;
    }
    
    // Get value
    function getValue(symbol) {
      return (holdings[symbol] || 0) * getPrice(symbol);
    }
    
    // Total value
    function getTotalValue() {
      return portfolio.usd + Object.keys(holdings).reduce((sum, sym) => sum + getValue(sym), 0);
    }
    
    // Format currency
    function formatUSD(amount) {
      return '$' + amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    
    // Format crypto
    function formatCrypto(amount) {
      return amount.toFixed(6);
    }
    
    // Render markets
    function renderMarkets() {
      const container = document.getElementById('markets');
      container.innerHTML = prices.map(coin => `
        <div class="market-item ${coin.symbol === selectedCoin ? 'selected' : ''}" onclick="selectCoin('${coin.symbol}')">
          <div>
            <div class="symbol">${coin.symbol}</div>
            <div class="name">${coin.name}</div>
          </div>
          <div>
            <div class="price">${formatUSD(coin.price)}</div>
            <div class="change ${coin.change24h >= 0 ? 'up' : 'down'}">
              ${coin.change24h >= 0 ? '↑' : '↓'} ${Math.abs(coin.change24h).toFixed(2)}%
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // Select coin
    function selectCoin(symbol) {
      selectedCoin = symbol;
      renderMarkets();
      updateTradePanel();
    }
    
    // Update trade panel
    function updateTradePanel() {
      document.getElementById('selectedCoin').textContent = selectedCoin;
      document.getElementById('coinSymbol').textContent = selectedCoin;
      document.getElementById('coinSymbol2').textContent = selectedCoin;
      document.getElementById('currentPrice').textContent = formatUSD(getPrice(selectedCoin));
      document.getElementById('usdBalance').textContent = formatUSD(portfolio.usd);
      document.getElementById('coinBalance').textContent = formatCrypto(holdings[selectedCoin] || 0);
      document.getElementById('totalValue').textContent = formatUSD(getTotalValue());
    }
    
    // Handle buy
    function handleBuy() {
      const amount = parseFloat(document.getElementById('tradeAmount').value);
      if (!amount || amount <= 0) {
        alert('Enter a valid amount!');
        return;
      }
      
      const cost = amount * getPrice(selectedCoin);
      if (cost > portfolio.usd) {
        alert('Insufficient USD balance!');
        return;
      }
      
      portfolio.usd -= cost;
      holdings[selectedCoin] = (holdings[selectedCoin] || 0) + amount;
      
      history.unshift({
        type: 'BUY',
        coin: selectedCoin,
        amount,
        price: getPrice(selectedCoin),
        time: new Date().toLocaleTimeString()
      });
      
      document.getElementById('tradeAmount').value = '';
      updateTradePanel();
      renderHistory();
    }
    
    // Handle sell
    function handleSell() {
      const amount = parseFloat(document.getElementById('tradeAmount').value);
      if (!amount || amount <= 0) {
        alert('Enter a valid amount!');
        return;
      }
      
      if ((holdings[selectedCoin] || 0) < amount) {
        alert('Insufficient holdings!');
        return;
      }
      
      const revenue = amount * getPrice(selectedCoin);
      portfolio.usd += revenue;
      holdings[selectedCoin] -= amount;
      
      history.unshift({
        type: 'SELL',
        coin: selectedCoin,
        amount,
        price: getPrice(selectedCoin),
        time: new Date().toLocaleTimeString()
      });
      
      document.getElementById('tradeAmount').value = '';
      updateTradePanel();
      renderHistory();
    }
    
    // Render history
    function renderHistory() {
      const container = document.getElementById('historyList');
      if (history.length === 0) {
        container.innerHTML = '<div class="empty">No trades yet</div>';
        return;
      }
      
      container.innerHTML = history.map(trade => `
        <div class="history-item">
          <div>
            <span class="history-type ${trade.type.toLowerCase()}">${trade.type}</span>
            <span class="history-info">${trade.amount.toFixed(4)} ${trade.coin}</span>
          </div>
          <div class="history-meta">${formatUSD(trade.price)} • ${trade.time}</div>
        </div>
      `).join('');
    }
    
    // Show tab
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach((btn, i) => {
        btn.className = tab === ['trade', 'history'][i] ? 'tab' : 'tab inactive';
      });
      document.getElementById('tradeView').style.display = tab === 'trade' ? 'grid' : 'none';
      document.getElementById('historyView').style.display = tab === 'history' ? 'block' : 'none';
    }
    
    // Simulate price changes
    setInterval(() => {
      prices.forEach(coin => {
        coin.price = coin.price * (1 + (Math.random() - 0.5) * 0.002);
        coin.change24h += (Math.random() - 0.5) * 0.1;
      });
      renderMarkets();
      updateTradePanel();
    }, 3000);
    
    // Initial render
    renderMarkets();
    updateTradePanel();
  </script>
</body>
</html>
