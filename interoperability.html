<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital ID Interoperability Map</title>
<script src="https://unpkg.com/globe.gl"></script>
<style>
:root { --bg: #0c0c0f; --border: #2a2a32; --text: #e8e8ec; --text-dim: #8a8a96; --accent: #e8c547; --success: #4ade80; --blue: #60a5fa; --purple: #a78bfa; --pink: #f472b6; --orange: #fb923c; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
.container { height: 100vh; display: flex; flex-direction: column; }
.header { padding: 12px 24px; background: rgba(12,12,15,0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
h1 { font-size: 1.1rem; }
.back { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
.toggles { display: flex; gap: 8px; flex-wrap: wrap; }
.toggle { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
.toggle:hover { border-color: var(--text-dim); }
.toggle.active { border-color: var(--accent); background: rgba(232,197,71,0.15); color: var(--accent); }
.toggle[data-layer="tsa"].active { border-color: #60a5fa; background: rgba(96,165,250,0.15); color: #60a5fa; }
.toggle[data-layer="eudi"].active { border-color: #e8c547; background: rgba(232,197,71,0.15); color: #e8c547; }
.toggle[data-layer="nordic"].active { border-color: #4ade80; background: rgba(74,222,128,0.15); color: #4ade80; }
.toggle[data-layer="format"].active { border-color: #a78bfa; background: rgba(167,139,250,0.15); color: #a78bfa; }
#globeViz { flex: 1; }
.info-panel { position: absolute; top: 70px; right: 24px; background: rgba(12,12,15,0.95); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; z-index: 10; max-width: 280px; }
.info-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.info-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; margin-bottom: 4px; }
.info-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend { position: absolute; bottom: 24px; left: 24px; background: rgba(12,12,15,0.9); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; z-index: 10; }
.legend-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; margin-bottom: 6px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.stats { font-size: 0.7rem; color: var(--text-dim); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="container">
<div class="header">
<div>
<a href="index.html" class="back">← Back to Registry</a>
<h1 style="margin-top:4px">🌐 Digital ID Interoperability</h1>
</div>
<div class="toggles">
<button class="toggle" data-layer="tsa">TSA mDL</button>
<button class="toggle" data-layer="eudi">EUDI Wallet</button>
<button class="toggle" data-layer="nordic">Nordic</button>
<button class="toggle" data-layer="format">Same Format</button>
</div>
</div>
<div id="globeViz"></div>
<div class="info-panel">
<div class="info-title">Selected: <span id="infoName">-</span></div>
<div id="infoContent"></div>
</div>
<div class="legend">
<div class="legend-title">Credential Formats</div>
<div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> mDL (ISO 18013-5)</div>
<div class="legend-item"><div class="legend-dot" style="background:#e8c547"></div> Verifiable Credentials</div>
<div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> PKI / BankID</div>
<div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Account / OIDC</div>
<div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div> ID Card / Certificate</div>
<div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div> Biometric</div>
<div class="stats">50 jurisdictions • 32 production</div>
</div>
</div>

<script>
(function() {
const formatColors = {
'mDL': '#60a5fa',
'Verifiable Credentials': '#e8c547',
'PKI': '#4ade80',
'OIDC': '#a78bfa',
'Account-based': '#a78bfa',
'ID Card': '#f472b6',
'Biometric': '#fb923c',
'Certificate': '#f472b6',
'Bank Credential': '#4ade80'
};

const locations = [
{name:'Finland',lat:61.92,lng:25.75,f:'Verifiable Credentials',s:'development',d:'EUDI Wallet pilot'},
{name:'Austroads',lat:-33.86,lng:151.21,f:'mDL',s:'development',d:'Digital Trust Service'},
{name:'Australia',lat:-25.27,lng:133.77,f:'Account-based',s:'production',d:'myID - 4M+ users'},
{name:'Brazil',lat:-14.23,lng:-51.92,f:'ID Card',s:'production',d:'Gov.br - 166M'},
{name:'China',lat:35.86,lng:104.19,f:'Account-based',s:'production',d:'Cyber ID'},
{name:'Estonia',lat:58.59,lng:25.01,f:'Bank Credential',s:'production',d:'Smart-ID'},
{name:'European Union',lat:50.85,lng:4.35,f:'Verifiable Credentials',s:'development',d:'EUDI Wallet 2026-27'},
{name:'Germany',lat:51.16,lng:10.45,f:'PKI',s:'production',d:'eID + EUDI pilot'},
{name:'India',lat:20.59,lng:78.96,f:'Biometric',s:'production',d:'Aadhaar - 1.3B'},
{name:'Israel',lat:31.04,lng:34.85,f:'PKI',s:'production',d:'Teudot Zihuy'},
{name:'Kenya',lat:-0.02,lng:37.9,f:'Account-based',s:'production',d:'eCitizen'},
{name:'Malaysia',lat:4.21,lng:101.97,f:'PKI',s:'production',d:'MyKad'},
{name:'Nigeria',lat:9.08,lng:8.67,f:'Biometric',s:'production',d:'NIN - 100M+'},
{name:'Oman',lat:21.47,lng:55.95,f:'PKI',s:'production',d:'National ID'},
{name:'Qatar',lat:25.35,lng:51.18,f:'ID Card',s:'production',d:'National ID'},
{name:'Saudi Arabia',lat:23.88,lng:45.07,f:'ID Card',s:'development',d:'Absher'},
{name:'Singapore',lat:1.35,lng:103.81,f:'OIDC',s:'production',d:'SingPass - 5M+'},
{name:'South Korea',lat:35.9,lng:127.76,f:'Certificate',s:'production',d:'Certificate'},
{name:'Sweden',lat:60.12,lng:18.64,f:'PKI',s:'production',d:'BankID - 94%'},
{name:'Italy',lat:41.87,lng:12.56,f:'Verifiable Credentials',s:'development',d:'IT-Wallet'},
{name:'Spain',lat:40.46,lng:-3.75,f:'Verifiable Credentials',s:'development',d:'Cl@ve + EUDI'},
{name:'France',lat:46.22,lng:2.21,f:'Verifiable Credentials',s:'development',d:'France Identité'},
{name:'Netherlands',lat:52.13,lng:5.29,f:'Verifiable Credentials',s:'development',d:'DigiD + EUDI'},
{name:'Portugal',lat:39.4,lng:-8.2,f:'Verifiable Credentials',s:'development',d:'EUDI pilot'},
{name:'Taiwan',lat:23.69,lng:120.96,f:'ID Card',s:'development',d:'TW DIW'},
{name:'United Arab Emirates',lat:23.42,lng:53.85,f:'Biometric',s:'production',d:'UAEPass'},
{name:'United Kingdom',lat:55.37,lng:-3.43,f:'Account-based',s:'development',d:'GOV.UK One Login'},
{name:'British Columbia',lat:49.28,lng:-123.12,f:'Verifiable Credentials',s:'production',d:'BC Wallet - 3M+'},
{name:'Alberta',lat:53.93,lng:-116.58,f:'Verifiable Credentials',s:'development',d:'Alberta Wallet'},
{name:'Ontario',lat:51.25,lng:-85.32,f:'ID Card',s:'development',d:'Ontario ID'},
{name:'Quebec',lat:52.94,lng:-73.41,f:'ID Card',s:'development',d:'Quebec ID'},
{name:'Manitoba',lat:53.76,lng:-98.81,f:'Verifiable Credentials',s:'development',d:'Manitoba ID'},
{name:'Saskatchewan',lat:52.94,lng:-106.45,f:'ID Card',s:'development',d:'Sask ID'},
{name:'New South Wales',lat:-33.86,lng:151.21,f:'Account-based',s:'development',d:'NSW Digital ID'},
{name:'Victoria',lat:-37.81,lng:144.96,f:'ID Card',s:'development',d:'Victoria ID'},
{name:'Louisiana',lat:30.98,lng:-91.96,f:'mDL',s:'production',d:'LA Wallet - TSA ✓'},
{name:'Arizona',lat:34.05,lng:-111.09,f:'mDL',s:'production',d:'AZ mDL - TSA ✓'},
{name:'Maryland',lat:39.04,lng:-76.64,f:'mDL',s:'production',d:'MD mDL - TSA ✓'},
{name:'Colorado',lat:39.55,lng:-105.78,f:'mDL',s:'production',d:'CO mDL - TSA ✓'},
{name:'Georgia',lat:32.16,lng:-82.9,f:'mDL',s:'production',d:'GA mDL - TSA ✓'},
{name:'Ohio',lat:40.42,lng:-82.9,f:'mDL',s:'production',d:'OH mDL - TSA ✓'},
{name:'California',lat:36.77,lng:-119.41,f:'mDL',s:'production',d:'CA DMV Wallet - TSA ✓'},
{name:'Utah',lat:39.32,lng:-111.09,f:'mDL',s:'production',d:'UT mDL - TSA ✓'},
{name:'Iowa',lat:41.88,lng:-93.1,f:'mDL',s:'production',d:'IA mDL - TSA ✓'},
{name:'Virginia',lat:37.43,lng:-79.14,f:'mDL',s:'production',d:'VA mDL - TSA ✓'},
{name:'Nevada',lat:38.8,lng:-116.42,f:'mDL',s:'production',d:'NV mDL - TSA ✓'},
{name:'Vermont',lat:44.04,lng:-72.7,f:'mDL',s:'production',d:'VT mDL - TSA ✓'},
{name:'New York',lat:40.71,lng:-74.01,f:'mDL',s:'production',d:'NY MiD - TSA ✓'},
{name:'New Jersey',lat:40.06,lng:-74.4,f:'mDL',s:'production',d:'NJ mDL - TSA ✓'},
{name:'Texas',lat:31.97,lng:-99.9,f:'mDL',s:'production',d:'TX mDL - TSA ✓'},
{name:'Norway',lat:60.47,lng:8.46,f:'PKI',s:'production',d:'BankID'},
{name:'Denmark',lat:56.26,lng:9.5,f:'PKI',s:'production',d:'MitID'},
{name:'Belgium',lat:50.85,lng:4.35,f:'Verifiable Credentials',s:'development',d:'EUDI pilot'},
{name:'Austria',lat:47.51,lng:14.55,f:'Verifiable Credentials',s:'development',d:'EUDI pilot'},
{name:'Poland',lat:51.92,lng:19.15,f:'Verifiable Credentials',s:'development',d:'EUDI pilot'},
];

const usStates = ['Louisiana','Arizona','Maryland','Colorado','Georgia','Ohio','California','Utah','Iowa','Virginia','Nevada','Vermont','New York','New Jersey','Texas'];
const euStates = ['Finland','Germany','Italy','Spain','France','Netherlands','Portugal','Belgium','Austria','Poland','European Union'];
const nordic = ['Sweden','Norway','Denmark','Estonia'];

// Connection groups
const connections = {
tsa: [],
eudi: [],
nordic: [],
format: []
};

// TSA (hub-spoke from Louisiana as primary)
connections.tsa = usStates.map(s => ({src:'Louisiana',dst:s,t:'tsa',c:'#60a5fa'}));
connections.tsa.push({src:'California',dst:'Arizona',t:'tsa',c:'#60a5fa'});
connections.tsa.push({src:'California',dst:'New York',t:'tsa',c:'#60a5fa'});
connections.tsa.push({src:'Louisiana',dst:'New York',t:'tsa',c:'#60a5fa'});

// EUDI (hub-spoke from Germany)
for (const s of euStates) {
  if (s !== 'Germany') connections.eudi.push({src:'Germany',dst:s,t:'eudi',c:'#e8c547'});
}

// Nordic (hub-spoke from Sweden)
for (const s of nordic) {
  if (s !== 'Sweden') connections.nordic.push({src:'Sweden',dst:s,t:'nordic',c:'#4ade80'});
}

// Same format connections (sample)
connections.format = [
{src:'Singapore',dst:'United Kingdom',f:'OIDC',c:'#a78bfa'},
{src:'India',dst:'Nigeria',f:'Biometric',c:'#fb923c'},
{src:'China',dst:'Kenya',f:'Account-based',c:'#a78bfa'},
{src:'Germany',dst:'Estonia',f:'PKI',c:'#4ade80'},
{src:'Sweden',dst:'Norway',f:'PKI',c:'4ade80'},
{src:'British Columbia',dst:'California',f:'mDL',c:'#60a5fa'},
{src:'British Columbia',dst:'Arizona',f:'mDL',c:'#60a5fa'},
];

const activeLayers = {tsa:false,eudi:false,nordic:false,format:false};

const elem = document.getElementById('globeViz');
const g = Globe()(elem);

g.globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg');
g.bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png');
g.backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png');
g.width(elem.clientWidth);
g.height(elem.clientHeight);

g.pointsData(locations);
g.pointLat(d => d.lat);
g.pointLng(d => d.lng);
g.pointColor(d => formatColors[d.f] || '#666');
g.pointAltitude(0.01);
g.pointRadius(d => d.s === 'production' ? 0.35 : 0.2);
g.pointLabel(d => '<div style="background:#141418;border:1px solid #2a2a32;border-radius:6px;padding:8px;color:#e8e8ec;font-size:12px"><strong>' + d.name + '</strong><br><span style="color:#8a8a96;font-size:11px">' + d.f + ' • ' + d.d + '</span></div>');

function updateArcs() {
  const arcs = [];
  for (const layer in activeLayers) {
    if (activeLayers[layer]) {
      arcs.push(...connections[layer]);
    }
  }
  g.arcsData(arcs);
  g.arcStartLat(d => locations.find(l => l.name === d.src)?.lat || 0);
  g.arcStartLng(d => locations.find(l => l.name === d.src)?.lng || 0);
  g.arcEndLat(d => locations.find(l => l.name === d.dst)?.lat || 0);
  g.arcEndLng(d => locations.find(l => l.name === d.dst)?.lng || 0);
  g.arcColor(d => d.c);
  g.arcDashLength(0.3);
  g.arcDashGap(0.15);
  g.arcDashAnimateTime(2000);
  g.arcAltitude(0.025);
}

updateArcs();

g.controls().autoRotate = true;
g.controls().autoRotateSpeed = 0.3;
g.pointOfView({lat:40,lng:-50,altitude:2.2});

// Toggle buttons
document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = btn.dataset.layer;
    activeLayers[layer] = !activeLayers[layer];
    btn.classList.toggle('active', activeLayers[layer]);
    updateArcs();
  });
});

// Point click info
g.onPointClick(d => {
  document.getElementById('infoName').textContent = d.name;
  const connectionsInfo = [];
  for (const layer in connections) {
    const related = connections[layer].filter(a => a.src === d.name || a.dst === d.name);
    if (related.length) {
      connectionsInfo.push(`<div class="info-item"><div class="info-dot" style="background:${related[0].c}"></div>${layer}: ${related.map(a => a.src === d.name ? a.dst : a.src).join(', ')}</div>`);
    }
  }
  document.getElementById('infoContent').innerHTML = connectionsInfo.length ? connectionsInfo.join('') : '<div style="color:var(--text-dim);font-size:0.8rem">No active connections</div>';
});

window.addEventListener('resize', function() {
  g.width(elem.clientWidth);
  g.height(elem.clientHeight);
});
})();
</script>
</body>
</html>
